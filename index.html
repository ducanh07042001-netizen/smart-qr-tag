<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 의류 정보 시스템 (Smart Clothing System)</title>
    
    <!-- 1. QR 스캔 라이브러리 로드 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* 2. CSS 스타일: 피그마 디자인을 바탕으로 구현 */
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            text-align: center; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
        }
        #reader { 
            width: 100%; 
            max-width: 400px; 
            margin: auto; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            background: white;
        }
        #result-box { 
            margin-top: 25px; 
            padding: 25px; 
            background: white; 
            display: none; 
            border-radius: 20px; 
            text-align: left;
            max-width: 360px; 
            margin-left: auto; 
            margin-right: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .item-title { font-size: 24px; font-weight: bold; color: #1d1d1f; margin-bottom: 8px; }
        .item-price { color: #0071e3; font-size: 20px; font-weight: 600; margin-bottom: 15px; }
        .info-label { color: #86868b; font-size: 14px; margin-top: 10px; }
        .info-value { color: #1d1d1f; font-size: 16px; margin-bottom: 10px; font-weight: 500; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 30px;">의류 태그 스캔 시스템</h2>
    
    <!-- 카메라 화면 출력 영역 -->
    <div id="reader"></div>
    
    <!-- 스캔 결과 출력 영역 (피그마 UI 반영) -->
    <div id="result-box">
        <div id="res-name" class="item-title"></div>
        <div id="res-price" class="item-price"></div>
        <hr>
        <div class="info-label">소재 정보</div>
        <div id="res-material" class="info-value"></div>
        <div class="info-label">세탁 및 취급 주의사항</div>
        <div id="res-care" class="info-value" style="color: #d9534f;"></div>
    </div>

    <script>
        // 3. 자바스크립트: 데이터 매칭 및 로직 처리
        // (SQLite 데이터베이스의 정보를 프론트엔드에서 모사함)
        const mockDatabase = {
            "SP001": { 
                name: "오버사이즈 코튼 티셔츠", 
                price: "29,000 KRW", 
                material: "100% 면 (Cotton)", 
                care: "30도 이하 미온수 세탁, 건조기 금지" 
            },
            "SP002": { 
                name: "슬림핏 데님 팬츠", 
                price: "45,000 KRW", 
                material: "데님 (Denim)", 
                care: "단독 세탁 권장, 그늘에서 건조" 
            },
            "SP003": { 
                name: "울 혼방 가디건", 
                price: "85,000 KRW", 
                material: "울 80%, 나일론 20%", 
                care: "드라이클리닝 전문점 이용 권장" 
            }
        };

        function onScanSuccess(decodedText) {
            // QR 코드 스캔 성공 시 (예: SP001 인식)
            const data = mockDatabase[decodedText];
            
            if (data) {
                document.getElementById('result-box').style.display = 'block';
                document.getElementById('res-name').innerText = data.name;
                document.getElementById('res-price').innerText = data.price;
                document.getElementById('res-material').innerText = data.material;
                document.getElementById('res-care').innerText = data.care;
                
                // 모바일 환경에서 스캔 성공 알림 (진동)
                if (navigator.vibrate) navigator.vibrate(100);
            } else {
                console.log("알 수 없는 상품 ID입니다: " + decodedText);
            }
        }

        // 스캐너 초기화 및 실행
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
            fps: 10, 
            qrbox: { width: 250, height: 250 } 
        });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
