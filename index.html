<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIDAS SMART CARE TAG</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans KR", sans-serif;
        }

        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: start;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* Khung mô phỏng màn hình điện thoại di động */
        .phone-container {
            width: 100%;
            max-width: 430px; /* Chuẩn iPhone Pro Max */
            background-color: #ffffff;
            min-height: 92vh;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Thanh Header cao cấp phía trên */
        .header {
            background-color: #ffffff;
            padding: 25px 20px 15px 20px;
            text-align: center;
            border-bottom: 1px solid #e2e2e7;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tag-sub {
            font-size: 11px;
            color: #86868b;
            letter-spacing: 1.5px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Khu vực nội dung chính */
        .content {
            padding: 20px;
            flex: 1;
        }

        /* Khung hiển thị hình ảnh sản phẩm */
        .image-viewport {
            width: 100%;
            height: 380px;
            background-color: #f5f5f7;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Thông tin chữ hiển thị */
        .product-title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .product-price {
            font-size: 22px;
            font-weight: 700;
            color: #0071e3; /* Màu xanh Apple Premium */
            text-align: center;
            margin-bottom: 25px;
        }

        /* Khu vực Size kích thước */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1d1d1f;
        }

        .size-box-container {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .size-badge {
            flex: 1;
            height: 44px;
            border: 1px solid #e2e2e7;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 14px;
            background-color: #ffffff;
            color: #1d1d1f;
            transition: all 0.2s;
        }

        .size-badge.active {
            background-color: #1d1d1f;
            color: #ffffff;
            border-color: #1d1d1f;
        }

        /* Mô tả chất liệu */
        .info-card {
            background-color: #f5f5f7;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 25px;
        }

        .info-text {
            font-size: 14px;
            color: #515154;
            line-height: 1.5;
        }

        /* Khu vực Biểu tượng Giặt là Care Icons */
        .care-grid {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border: 1px solid #e2e2e7;
            border-radius: 20px;
            padding: 20px 15px;
            margin-top: 10px;
        }

        .care-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        /* Vẽ biểu tượng giặt là dạng Vector để đảm bảo độ sắc nét trên mọi màn hình */
        .care-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            fill: none;
            stroke: #1d1d1f;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .care-label {
            font-size: 10px;
            color: #86868b;
            text-align: center;
            white-space: nowrap;
        }

        /* Thông báo khi không tìm thấy sản phẩm hoặc lỗi ID */
        .error-state {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .error-state h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <div class="brand-logo">Adidas</div>
            <div class="tag-sub">SMART CARE TAG</div>
        </div>

        <div class="content" id="main-content">
            <div class="image-viewport">
                <img id="p-img" src="" alt="Product Image" class="product-img">
            </div>

            <h1 class="product-title" id="p-name">Loading...</h1>
            <div class="product-price" id="p-price">0 KRW</div>

            <div class="section-title">선택 가능 사이즈 (Sizes)</div>
            <div class="size-box-container" id="p-sizes">
                </div>

            <div class="section-title">소재 및 케어 정보 (Material)</div>
            <div class="info-card">
                <p class="info-text" id="p-material">Loading...</p>
            </div>

            <div class="section-title">세탁 및 취급 주의사항 (Care Instructions)</div>
            <div class="care-grid">
                <div class="care-item">
                    <svg class="care-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                    </svg>
                    <div class="care-label">
