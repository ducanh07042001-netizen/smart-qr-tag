<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIDAS SMART CARE TAG</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f5f5f7; color: #1d1d1f; display: flex; justify-content: center; align-items: start; min-height: 100vh; padding: 20px 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; }
        .phone-container { width: 100%; max-width: 430px; background-color: #ffffff; min-height: 92vh; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .header { background-color: #ffffff; padding: 25px 20px 15px 20px; text-align: center; border-bottom: 1px solid #e2e2e7; }
        .brand-logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .tag-sub { font-size: 11px; color: #86868b; letter-spacing: 1.5px; margin-top: 4px; font-weight: 500; }
        .content { padding: 20px; flex: 1; }
        .image-viewport { width: 100%; height: 380px; background-color: #f5f5f7; border-radius: 24px; overflow: hidden; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .product-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 10px; line-height: 1.3; }
        .product-price { font-size: 22px; font-weight: 700; color: #0071e3; text-align: center; margin-bottom: 25px; }
        .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #1d1d1f; }
        .size-box-container { display: flex; gap: 10px; margin-bottom: 25px; }
        .size-badge { flex: 1; height: 44px; border: 1px solid #e2e2e7; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-weight: 600; font-size: 14px; background-color: #ffffff; }
        .size-badge.active { background-color: #1d1d1f; color: #ffffff; border-color: #1d1d1f; }
        .info-card { background-color: #f5f5f7; border-radius: 16px; padding: 16px; margin-bottom: 25px; }
        .info-text { font-size: 14px; color: #515154; line-height: 1.5; }
        .care-grid { display: flex; justify-content: space-between; align-items: center; background: #ffffff; border: 1px solid #e2e2e7; border-radius: 20px; padding: 20px 15px; margin-top: 10px; }
        .care-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .care-icon { width: 32px; height: 32px; margin-bottom: 8px; fill: none; stroke: #1d1d1f; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .care-label { font-size: 10px; color: #86868b; text-align: center; white-space: nowrap; }
        .error-state { display: none; text-align: center; padding: 40px 20px; }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="header">
            <div class="brand-logo">Adidas</div>
            <div class="tag-sub">SMART CARE TAG</div>
        </div>

        <div class="content" id="main-content">
            <div class="image-viewport">
                <img id="p-img" src="" alt="Product Image" class="product-img">
            </div>
            <h1 class="product-title" id="p-name">Loading...</h1>
            <div class="product-price" id="p-price">0 KRW</div>

            <div class="section-title">선택 가능 사이즈 (Sizes)</div>
            <div class="size-box-container" id="p-sizes"></div>

            <div class="section-title">소재 및 케어 정보 (Material)</div>
            <div class="info-card">
                <p class="info-text" id="p-material">Loading...</p>
            </div>

            <div class="section-title">세탁 및 취급 주의사항 (Care Instructions)</div>
            <div class="care-grid">
                <div class="care-item">
                    <svg class="care-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
                    <div class="care-label">드라이클리닝<br>금지</div>
                </div>
                <div class="care-item">
                    <svg class="care-icon" viewBox="0 0 24 24"><path d="M12 2L2 22h20L12 2z"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
                    <div class="care-label">표백 금지</div>
                </div>
                <div class="care-item">
                    <svg class="care-icon" viewBox="0 0 24 24"><path d="M4 12c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8-8-3.6-8-8z"/><path d="M12 8v8M8 12h8"/></svg>
                    <div class="care-label">찬물 세탁<br>권장</div>
                </div>
                <div class="care-item">
                    <svg class="care-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="6"/></svg>
                    <div class="care-label">저온 건조<br>금지</div>
                </div>
                <div class="care-item">
                    <svg class="care-icon" viewBox="0 0 24 24"><path d="M4 18h16M4 14h13a3 3 0 0 0 3-3V7a1 1 0 0 0-1-1H7a4 4 0 0 0-4 4v4"/></svg>
                    <div class="care-label">저온 다림질<br>가능</div>
                </div>
            </div>
        </div>

        <div class="content error-state" id="error-content">
            <h2 style="color: #ff3b30;">❌ 상품 정보를 찾을 수 없습니다.</h2>
            <p style="color: #86868b; font-size: 14px; margin-top: 10px;">Mã QR không hợp lệ hoặc sản phẩm không tồn tại.</p>
        </div>
    </div>

    <script>
        // CƠ SỞ DỮ LIỆU ĐỒNG BỘ HIỂN THỊ TRÊN WEB DI ĐỘNG
        const productDatabase = {
            "SP001": {
                name: "오버사이즈 코튼 티셔츠",
                price: "29,000 KRW",
                sizes: ["M", "L", "XL"],
                material: "소재: 100% 코튼(Cotton) - 프리미엄 에코 원사",
                img: "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&q=80&w=600"
            },
            "SP002": {
                name: "슬림핏 청바지",
                price: "45,000 KRW",
                sizes: ["30", "32", "34"],
                material: "소재: 98% 데님 코튼, 2% 스판덱스 (고탄력 데님)",
                img: "https://images.unsplash.com/photo-1542272604-787c3835535d?auto=format&fit=crop&q=80&w=600"
            }
        };

        function renderProductInfo() {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            const mainContent = document.getElementById('main-content');
            const errorContent = document.getElementById('error-content');

            if (productId && productDatabase[productId]) {
                const product = productDatabase[productId];
                document.getElementById('p-name').innerText = product.name;
                document.getElementById('p-price').innerText = product.price;
                document.getElementById('p-material').innerText = product.material;
                document.getElementById('p-img').src = product.img;

                const sizeContainer = document.getElementById('p-sizes');
                sizeContainer.innerHTML = '';
                product.sizes.forEach((size, index) => {
                    const badge = document.createElement('div');
                    badge.className = `size-badge ${index === 0 ? 'active' : ''}`;
                    badge.innerText = size;
                    sizeContainer.appendChild(badge);
                });

                mainContent.style.display = 'block';
                errorContent.style.display = 'none';
            } else {
                mainContent.style.display = 'none';
                errorContent.style.display = 'block';
            }
        }
        window.onload = renderProductInfo;
    </script>
</body>
</html>
